<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mygladix - Diario di Bordo</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>

    <div class="app-container">
        
        <div class="auth-panel" id="authPanel">
            <div class="auth-card">
                <h2 class="auth-card__title">Diario di Bordo</h2>
                <form class="auth-card__form" id="loginForm">
                    <div class="auth-card__field">
                        <label class="auth-card__label" for="username">Utente</label>
                        <input class="auth-card__input" type="text" id="username" required placeholder="Il tuo nome">
                    </div>
                    <div class="auth-card__field">
                        <label class="auth-card__label" for="password">Password</label>
                        <input class="auth-card__input" type="password" id="password" required placeholder="••••••••">
                    </div>
                    <div class="auth-card__error" id="loginError" style="display: none;"></div>
                    <button class="auth-card__button" type="submit">Accedi</button>
                </form>
            </div>
        </div>

        <main class="workspace" id="workspacePanel" style="display: none;">
            <header class="workspace__header">
                <h1 class="workspace__title">Ciao, <span id="employeeName">...</span></h1>
                <button class="workspace__logout-btn" id="logoutBtn">Esci</button>
            </header>

            <section class="report-section" id="employeeView" style="display: none;">
                <div class="report-card">
                    <h3 class="report-card__subtitle">Cosa hai fatto oggi?</h3>
                    <form class="report-card__form" id="reportForm">
                        <div class="report-card__input-wrapper">
                            <textarea class="report-card__input" type="text" id="activityInput" required placeholder="Es. Ottimizzato il caricamento delle immagini sul sito...">
                            </textarea> 
                        </div>
                        <button class="report-card__add-btn" type="submit">Invia Report</button>
                    </form>
                    <div class="report-card__success" id="reportSuccess" style="display: none;">Report salvato con successo! 🎉</div>
                </div>
            </section>

            <section class="admin-section" id="adminView" style="display: none;">
                <h2 class="admin-section__title">Riepilogo Settimanale per la Riunione</h2>
                
                <div class="admin-section__filters">
                    <input type="date" id="startDate" class="admin-section__date-input">
                    <input type="date" id="endDate" class="admin-section__date-input">
                    <button id="filterBtn" class="admin-section__btn">Genera Report</button>
                </div>

                <div class="report-grid" id="reportGrid">
                    </div>
            </section>
        </main>

    </div>

    <script src="js/app.js"></script>
</body>
</html>
